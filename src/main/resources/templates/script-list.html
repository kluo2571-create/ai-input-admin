<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>话术示例 - 妙言AI管理后台</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<header class="topnav">
    <span class="logo">🧠 妙言AI</span>
    <nav class="nav-links">
        <a href="/admin/scripts" class="nav-item active">📝 话术示例</a>
        <span class="nav-item disabled">📋 场景模板</span>
        <span class="nav-item disabled">👤 用户管理</span>
    </nav>
</header>

<main class="main">
    <div class="topbar">
        <h1>话术示例管理</h1>
        <a href="/admin/scripts/new" class="btn btn-primary">＋ 新增示例</a>
    </div>

    <div class="filter-bar">
        <button class="filter-chip active" data-cat="">全部</button>
        <button class="filter-chip" data-cat="love">💕 恋爱</button>
        <button class="filter-chip" data-cat="sales">💼 销售</button>
        <button class="filter-chip" data-cat="business">🤝 商务</button>
        <button class="filter-chip" data-cat="daily">☕ 日常</button>
    </div>

    <div id="loading" class="loading">加载中...</div>

    <table id="table" class="data-table" style="display:none">
        <thead>
            <tr>
                <th style="width:150px">标题</th>
                <th style="width:80px">分类</th>
                <th>情景描述</th>
                <th style="width:200px">参考回复</th>
                <th style="width:60px">引用</th>
                <th style="width:120px">操作</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <div id="empty" class="empty" style="display:none">暂无话术示例，<a href="/admin/scripts/new">去新建</a></div>
</main>

<script>
const API = '/api/script';
let currentCategory = '';

async function loadList() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('table').style.display = 'none';
    document.getElementById('empty').style.display = 'none';

    let url = API + '/list';
    if (currentCategory) url += '?category=' + currentCategory;

    try {
        const resp = await fetch(url);
        const json = await resp.json();
        const data = json.data || [];

        if (data.length === 0) {
            document.getElementById('empty').style.display = 'block';
        } else {
            document.getElementById('table').style.display = '';
            renderTable(data);
        }
    } catch (e) {
        alert('加载失败: ' + e.message);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function renderTable(data) {
    const tbody = document.getElementById('tbody');
    const catLabel = {love:'恋爱', sales:'销售', business:'商务', daily:'日常'};

    tbody.innerHTML = data.map(item => `
        <tr>
            <td><strong>${esc(item.title)}</strong>
                ${item.tags ? '<br><small class="tags">' + item.tags.split(',').map(t => '<span class="tag">'+esc(t.trim())+'</span>').join('') + '</small>' : ''}
            </td>
            <td><span class="badge badge-${item.category || 'love'}">${catLabel[item.category] || item.category}</span></td>
            <td class="text-muted">${esc(item.situation || '').substring(0, 80)}</td>
            <td class="reply-preview">${esc(item.aiReply || '').substring(0, 60)}</td>
            <td class="text-center">${item.useCount || 0}</td>
            <td>
                <button class="btn btn-sm" onclick="editItem(${item.id})">编辑</button>
                <button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})">删除</button>
            </td>
        </tr>
    `).join('');
}

async function deleteItem(id) {
    if (!confirm('确定删除这条话术示例吗？')) return;
    try { await fetch(API + '/' + id, { method: 'DELETE' }); loadList(); }
    catch (e) { alert('删除失败'); }
}

function editItem(id) { window.location.href = '/admin/scripts/new?id=' + id; }

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

document.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentCategory = this.dataset.cat;
        loadList();
    });
});

loadList();
</script>
</body>
</html>
